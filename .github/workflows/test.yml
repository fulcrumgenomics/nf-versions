name: CI

on: [push]

jobs:
  test:
    name: Build and Test the Plugin
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        JAVA_VERSION: [17, 21]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'true'

      - name: Setup Java ${{ matrix.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.JAVA_VERSION}}
          architecture: x64
          distribution: adopt

      - name: Compile
        run: |
          make clean
          make assemble

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@fef5c9568ca6c4ff7707bf840ab0692ba3f08293  # v0.9.0

      - name: Install all Pixi environments (for full test suite)
        run: pixi install --all

      - name: Install
        run: make install

      - name: Test
        run: make test
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
